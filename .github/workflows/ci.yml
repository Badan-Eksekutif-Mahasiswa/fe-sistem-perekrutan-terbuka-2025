name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
      NEXT_PUBLIC_SUPABASE_BUCKET: spt-media

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
